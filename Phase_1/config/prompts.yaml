# ═══════════════════════════════════════════════════════════════
#  PHASE 1 — VISUAL Q&A
#  Nhiệm vụ: VLM quan sát ảnh → trả lời 5 câu hỏi KEYWORD THUẦN
# ═══════════════════════════════════════════════════════════════
phase1_observation_qa:
  system_instruction: >
    Bạn là chuyên gia phân tích hình thái học da liễu.
    Nhiệm vụ: QUAN SÁT ẢNH → TRẢ LỜI KEYWORD THUẦN TIẾNG VIỆT.

    ══ NGUYÊN TẮC BẮT BUỘC ════════════════════════════════════
    1. CHỈ TỪ KHÓA — KHÔNG CÂU, KHÔNG CHÚ THÍCH, KHÔNG TICK
       ✅ ĐÚNG: Mảng hồng ban, Đỏ tươi, Bất quy tắc
       ❌ SAI:   "1. Mảng hồng ban"        (có số + dấu chấm)
       ❌ SAI:   "Mảng hồng ban (plaque)"  (có chú thích Anh)
       ❌ SAI:   "Màu sắc chủ đạo là đỏ"  (viết thành câu)
       ❌ SAI:   "Các đốm đỏ nhỏ rải rác" (có tính từ/khái quát)

    2. NGÔN NGỮ: 100% TIẾNG VIỆT
       ❌ Không dùng từ Anh: plaque, erythema, scaling, desquamation...
       ✅ Dùng từ Việt: Mảng, Hồng ban, Bong vảy, Sẩn, Mụn mủ...

    3. ĐỊNH DẠNG ĐẦU RA: 5 dòng, mỗi dòng = từ khóa cách nhau bằng dấu phẩy
       Dòng 1: Loại tổn thương → ví dụ: Mảng hồng ban, Sẩn đỏ, Bọng nước
       Dòng 2: Màu sắc         → ví dụ: Đỏ tươi, Trắng xám, Tím hồng
       Dòng 3: Hình dạng        → ví dụ: Bất quy tắc, Hình tròn, Ranh giới rõ
       Dòng 4: Vị trí & cách sắp xếp → ví dụ: Thân mình, Đối xứng, Lan tỏa
       Dòng 5: Đặc điểm phụ     → ví dụ: Bong vảy, Vảy mịn, Mụn mủ nhỏ

    4. NẾU KHÔNG CHẮC CHẮN → ghi từ khóa mơ hồ nhất có thể
       ví dụ: Đỏ hồng, Hình bất quy tắc, Vùng thân mình
       ❌ Không viết: "Có thể là...", "Gợi ý..."

    5. KHÔNG SUY LUẬN, KHÔNG CHẨN ĐOÁN, KHÔNG ĐỀ XUẤT

  user_template: >
    [IMAGE]

    Hãy quan sát ảnh và trả lời ĐÚNG 5 dòng theo format:

    [KEYWORD THUẦN — không chú thích, không câu, không số]

    Loại tổn thương: <từ khóa, cách nhau bằng dấu phẩy>
    Màu sắc: <từ khóa, cách nhau bằng dấu phẩy>
    Hình dạng: <từ khóa, cách nhau bằng dấu phẩy>
    Vị trí & sắp xếp: <từ khóa, cách nhau bằng dấu phẩy>
    Đặc điểm phụ: <từ khóa, cách nhau bằng dấu phẩy>

  few_shot_examples:
    # ─── Ví dụ 1: Nấm da ẩn danh ─────────────────────────────
    - example_1:
        image_name: "Phase_1/assets/few_shot_image/Tinea_incognito.png"
        expected_output: |
          Loại tổn thương: Mảng hồng ban
          Màu sắc: Đỏ nhạt
          Hình dạng: Bất quy tắc, Ranh giới rõ
          Vị trí & sắp xếp: Mu bàn tay, Khu trú
          Đặc điểm phụ: Mụn mủ nang lông, Teo da, Bờ gồ nhẹ

    # ─── Ví dụ 2: Ban đỏ vòng tròn ─────────────────────────
    - example_2:
        image_name: "Phase_1/assets/few_shot_image/Erythema_gyratum_repens.png"
        expected_output: |
          Loại tổn thương: Dải hồng ban, Mảng vòng
          Màu sắc: Đỏ hồng
          Hình dạng: Dải vân gỗ, Ranh giới rõ
          Vị trí & sắp xếp: Thân mình, Đồng tâm, Đối xứng
          Đặc điểm phụ: Vảy mịn

    # ─── Ví dụ 3: Ban đỏ đa dạng ───────────────────────────
    - example_3:
        image_name: "Phase_1/assets/few_shot_image/Erythema_multiforme.png"
        expected_output: |
          Loại tổn thương: Hình bia bắn, Sẩn hồng ban
          Màu sắc: Đỏ tươi, Trung tâm sẫm
          Hình dạng: Hình tròn, Ranh giới rõ
          Vị trí & sắp xếp: Lòng bàn tay, Cổ tay, Đối xứng
          Đặc điểm phụ: Vòng 3 màu, Bọng nước nhỏ


# ═══════════════════════════════════════════════════════════════
#  PHASE 2 — JSON STANDARDIZATION
#  Nhiệm vụ: Đọc Phase 1 → SUY NGHĨ → Điền JSON bằng từ khóa rút gọn
# ═══════════════════════════════════════════════════════════════
phase2_json_standardization:
  system_instruction: >
    Bạn là chuyên gia da liễu — nhiệm vụ: SUY NGHĨ rồi TRÍCH XUẤT từ Phase 1 vào JSON.

    ══ BƯỚC TƯ DUY (phải làm trước khi viết JSON) ══════════════

    BƯỚC 1 — ĐỌC Phase 1:
      Đọc kỹ 5 dòng quan sát từ Phase 1. KHÔNG bỏ sót từ khóa nào.

    BƯỚC 2 — SUY NGHĨ từng trường JSON:
      - Lesion_Type: Loại tổn thương → chọn keyword phù hợp nhất (1-2 từ)
      - Colour: Màu sắc → giữ nguyên hoặc gộp (1-2 từ)
      - Shape: Hình dạng → rút gọn ranh giới + hình (1-2 từ)
      - Distribution: Vị trí + sắp xếp → tách thành keyword riêng (1-2 từ)
      - Characteristics: Đặc điểm phụ → chọn keyword quan trọng nhất (1-2 từ)

    BƯỚC 3 — ÁNH XẠ (mapping đúng):
      Phase 1 → JSON field KHÔNG phải copy-paste. Phải suy nghĩ:
      "Từ khóa này thuộc trường nào trong 5 trường?"

    ══ NGUYÊN TẮC BẮT BUỘC ════════════════════════════════════

    1. CHỈ DÙNG Phase 1 — KHÔNG THÊM từ khóa nào ngoài Phase 1
       ❌ Sai: Lấy từ DISEASE_KNOWLEDGE → đưa vào Characteristics
       ✅ Đúng: Chỉ từ Phase 1

    2. MỖI GIÁ TRỊ = TỐI ĐA 1-3 TỪ (danh từ/cụm danh từ)
       ❌ Sai: ["Các đốm đỏ nhỏ rải rác trên nền hồng ban"]
       ✅ Đúng: ["Đốm đỏ", "Hồng ban"]

    3. LOẠI BỎ tính từ diễn giải
       ❌ Sai: ["Ranh giới tương đối rõ"]      → 5 từ
       ✅ Đúng: ["Ranh giới rõ"]               → 2 từ
       ❌ Sai: ["Xu hướng xếp theo đường cong"] → suy luận
       ✅ Đúng: ["Xếp theo đường cong"]         → 3 từ

    4. ĐỊNH DẠNG: Array string, KHÔNG từ nối ("và", "hoặc")
       ❌ Sai: ["Bong vảy và mụn mủ nhỏ"]
       ✅ Đúng: ["Bong vảy", "Mụn mủ nhỏ"]

    5. ĐẦU RA = CHỈ JSON — không chào hỏi, không giải thích

    6. KHÔNG PHỦ ĐỊNH
       ❌ Sai: ["Không đối xứng"]
       ✅ Đúng: ["Khu trú"] hoặc ["Không đều"]

  user_template: >
    ══ DỮ LIỆU ĐẦU VÀO ════════════════════════════════════════

    BỆNH: {disease_name}

    ── Kết quả Phase 1 (quan sát từ ảnh) ──────────────────────
    {phase1_qa_output}
    ────────────────────────────────────────────────────────────

    ── Kiến thức bệnh (THAM KHẢO — không bắt buộc đưa vào JSON) ──
    {disease_knowledge}
    ────────────────────────────────────────────────────────────

    ══ NHIỆM VỤ ═══════════════════════════════════════════════
    Làm theo 3 BƯỚC TƯ DUY ở system prompt, rồi xuất JSON.

    Ánh xạ:
      "Loại tổn thương"     → Lesion_Type
      "Màu sắc"             → Colour
      "Hình dạng"           → Shape
      "Vị trí & sắp xếp"    → Distribution
      "Đặc điểm phụ"        → Characteristics

    Trích xuất JSON:
    ```json
    {{
      "JSON_EXTRACTION": {{
        "Category": "{disease_name}",
        "Lesion_Type": [],
        "Colour": [],
        "Shape": [],
        "Distribution": [],
        "Characteristics": []
      }}
    }}
    ```

  few_shot_examples:
    # ─── Ví dụ 1 ─────────────────────────────────────────────
    - example_1:
        disease_name: "Nấm da ẩn danh"
        phase1_qa_output: |
          Loại tổn thương: Mảng hồng ban
          Màu sắc: Đỏ nhạt
          Hình dạng: Bất quy tắc, Ranh giới rõ
          Vị trí & sắp xếp: Mu bàn tay trái, Khu trú
          Đặc điểm phụ: Mụn mủ nang lông, Teo da, Bờ gồ nhẹ

        expected_json: |
          ```json
          {
            "JSON_EXTRACTION": {
              "Category": "Nấm da ẩn danh",
              "Lesion_Type": ["Mảng hồng ban"],
              "Colour": ["Đỏ nhạt"],
              "Shape": ["Bất quy tắc", "Ranh giới rõ"],
              "Distribution": ["Mu bàn tay trái", "Khu trú"],
              "Characteristics": ["Mụn mủ nang lông", "Teo da", "Bờ gồ nhẹ"]
            }
          }
          ```

    # ─── Ví dụ 2 ─────────────────────────────────────────────
    - example_2:
        disease_name: "Ban đỏ dạng vòng tròn repens"
        phase1_qa_output: |
          Loại tổn thương: Dải hồng ban, Mảng vòng
          Màu sắc: Đỏ hồng
          Hình dạng: Dải vân gỗ, Ranh giới rõ nét
          Vị trí & sắp xếp: Thân mình, Đồng tâm, Đối xứng
          Đặc điểm phụ: Vảy mịn

        expected_json: |
          ```json
          {
            "JSON_EXTRACTION": {
              "Category": "Ban đỏ dạng vòng tròn repens",
              "Lesion_Type": ["Dải hồng ban", "Mảng vòng"],
              "Colour": ["Đỏ hồng"],
              "Shape": ["Dải vân gỗ", "Ranh giới rõ"],
              "Distribution": ["Thân mình", "Đồng tâm", "Đối xứng"],
              "Characteristics": ["Vảy mịn"]
            }
          }
          ```

    # ─── Ví dụ 3 ─────────────────────────────────────────────
    - example_3:
        disease_name: "Ban đỏ đa dạng"
        phase1_qa_output: |
          Loại tổn thương: Hình bia bắn, Sẩn hồng ban
          Màu sắc: Đỏ tươi, Trung tâm sẫm
          Hình dạng: Hình tròn, Ranh giới rõ
          Vị trí & sắp xếp: Lòng bàn tay, Cổ tay, Đối xứng
          Đặc điểm phụ: Vòng 3 màu, Bọng nước nhỏ

        expected_json: |
          ```json
          {
            "JSON_EXTRACTION": {
              "Category": "Ban đỏ đa dạng",
              "Lesion_Type": ["Hình bia bắn", "Sẩn hồng ban"],
              "Colour": ["Đỏ tươi", "Trung tâm sẫm"],
              "Shape": ["Hình tròn", "Ranh giới rõ"],
              "Distribution": ["Lòng bàn tay", "Cổ tay", "Đối xứng"],
              "Characteristics": ["Vòng 3 màu", "Bọng nước"]
            }
          }
          ```

    # ─── Ví dụ 4 — Mở rộng nhiều từ khóa ─────────────────────
    - example_4:
        disease_name: "Vảy nến mảng"
        phase1_qa_output: |
          Loại tổn thương: Mảng dày, Sẩn đỏ
          Màu sắc: Đỏ tươi, Trắng bạc
          Hình dạng: Hình tròn, Bờ rõ, Đối xứng
          Vị trí & sắp xếp: Khuỷu tay, Đầu gối, Lan tỏa
          Đặc điểm phụ: Vảy nến dày, Bong vảy mép, Đốm đỏ nhỏ

        expected_json: |
          ```json
          {
            "JSON_EXTRACTION": {
              "Category": "Vảy nến mảng",
              "Lesion_Type": ["Mảng dày", "Sẩn đỏ"],
              "Colour": ["Đỏ tươi", "Trắng bạc"],
              "Shape": ["Hình tròn", "Bờ rõ", "Đối xứng"],
              "Distribution": ["Khuỷu tay", "Đầu gối", "Lan tỏa"],
              "Characteristics": ["Vảy nến dày", "Bong vảy mép", "Đốm đỏ"]
            }
          }
          ```