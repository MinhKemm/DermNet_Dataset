# PHASE 1: VISUAL Q&A (Chỉ quan sát hình ảnh - Trả lời câu hỏi)
phase1_observation_qa:
  system_instruction: >
    Bạn là một chuyên gia phân tích hình thái học da liễu. Nhiệm vụ của bạn là quan sát hình ảnh lâm sàng và trả lời các câu hỏi sau dựa trên những gì bạn nhìn thấy
    
    NGUYÊN TẮC CỐT LÕI:
    - KHÔNG ĐOÁN TÊN BỆNH: Tuyệt đối không được nêu tên bệnh hay mã bệnh trong câu trả lời
    - TRUNG THỰC: Trả lời câu hỏi dựa trên những gì thấy trên ảnh. Nếu không trả lời được câu hỏi nào, hãy ghi "Không quan sát rõ". 
    - KHÔNG GIẢI THÍCH: Trả lời ngắn gọn, đúng trọng tâm câu hỏi, không thêm giải thích hay mô tả dài dòng
    - ĐỊNH DẠNG BẮT BUỘC: Mỗi dòng chỉ chứa các cụm từ, ngăn cách bởi dấu phẩy

  user_template: >
    DỮ LIỆU ĐẦU VÀO:
    [IMAGE]: (Hình ảnh lâm sàng)
    
    Nhiệm vụ: Hãy quan sát ảnh và trả lời các câu hỏi sau chính xác:
    1. Loại tổn thương cơ bản trên ảnh là gì?
    2. Màu sắc chủ đạo của tổn thương là gì?
    3. Hình dạng, ranh giới của tổn thương ra sao?
    4. Vùng cơ thể/vị trí giải phẫu và cách sắp xếp của tổn thương như thế nào?
    5. Có các đặc điểm nhận dạng phụ nào thực sự xuất hiện không?


  few_shot_examples:
    - example_1:
        image_name: "Phase_1/assets/few_shot_image/Tinea_incognito.png"
        expected_output: >
          1. Mảng hồng ban
          2. Đỏ nhạt
          3. Bất quy tắc, ranh giới rõ
          4. Mu bàn tay trái, khu trú
          5. Mụn mủ nang lông, teo da, bờ gồ nhẹ

    - example_2:
        image_name: "Phase_1/assets/few_shot_image/Erythema_gyratum_repens.png"
        expected_output: >
          1. Dải hồng ban uốn lượn, mảng dạng vòng
          2. Đỏ hồng
          3. Dải kiểu vân gỗ, ranh giới rõ nét
          4. Vùng thân mình, sắp xếp đồng tâm, đối xứng
          5. Vảy mịn

    - example_3:
        image_name: "Phase_1/assets/few_shot_image/Erythema_multiforme.png"
        expected_output: >
          1. Hình bia bắn, sẩn hồng ban
          2. Đỏ tươi, trung tâm sẫm màu
          3. Hình tròn, ranh giới rõ
          4. Lòng bàn tay, cổ tay, cẳng tay; sắp xếp đối xứng
          5. Tổn thương bia bắn 3 vòng màu, bọng nước nhỏ

# PHASE 2: MEDICAL JSON MAPPING (Chuẩn hóa dựa trên Q&A và Kiến thức)
phase2_json_standardization:
  system_instruction: >
    Bạn là một chuyên gia AI Da liễu cao cấp. Nhiệm vụ của bạn là tổng hợp các câu trả lời quan sát từ Phase 1 và đối chiếu với DISEASE_KNOWLEDGE để tạo ra file JSON chuẩn hóa.

    NGUYÊN TẮC CỐT LÕI:
    - ZERO-HALLUCINATION: Chỉ trích xuất những đặc điểm CÓ XUẤT HIỆN trong OBSERVATION_QA. Tuyệt đối không thêm các đặc điểm nào.
    - CATEGORY: Luôn lấy từ tên bệnh được cung cấp, là chuỗi đơn .
    - ĐỊNH DẠNG: Mỗi đặc điểm phải là một cụm riêng, ngăn cách bởi dấu phẩy. KHÔNG dùng "và", "hoặc"
    - ĐỊNH DẠNG TRẢ VỀ: Chỉ trả về duy nhất một khối JSON hợp lệ. Không có văn bản giải thích trước hoặc sau khối JSON.

  user_template: >
    DỮ LIỆU ĐẦU VÀO:
    1. OBSERVATION_QA (Kết quả Phase 1): {phase1_qa_output}
    2. DISEASE_KNOWLEDGE (Kiến thức về bệnh {disease_name}): {disease_knowledge}
    
    Nhiệm vụ: Hãy trích xuất thông tin vào JSON theo cấu trúc nghiêm ngặt sau:
    ```json
    {{
      "JSON_EXTRACTION": {{
        "Category": "{disease_name}",
        "Lesion_Type": [],
        "Colour": [],
        "Shape": [],
        "Distribution": [],
        "Characteristics": []
      }}
    }}
    ```

  few_shot_examples:
    - example_1:
        disease_name: "Nấm da ẩn danh"
        phase1_qa_output: >
          1. Mảng hồng ban.
          2. Đỏ nhạt.
          3. Bất quy tắc, ranh giới rõ.
          4. Mu bàn tay trái, khu trú.
          5. Mụn mủ nang lông, teo da, bờ gồ nhẹ.

        expected_json: |
          ```json
          {
            "JSON_EXTRACTION": {
              "Category": "Nấm da ẩn danh (Tinea Incognito)",
              "Lesion_Type": ["Mảng hồng ban"],
              "Colour": ["Đỏ nhạt"],
              "Shape": ["Bất quy tắc", "Ranh giới rõ"],
              "Distribution": ["Mu bàn tay trái", "Khu trú"],
              "Characteristics": ["Mụn mủ nang lông", "Teo da", "Bờ gồ nhẹ"]
            }
          }
          ```
    - example_2:
        disease_name: "Ban đỏ dạng vòng tròn repens"
        phase1_qa_output: >
          1. Dải hồng ban uốn lượn, mảng dạng vòng.
          2. Đỏ hồng.
          3. Dải kiểu vân gỗ, ranh giới rõ nét.
          4. Vùng thân mình, sắp xếp đồng tâm, đối xứng.
          5. Vảy mịn.

        expected_json: |
          ```json
          {
            "JSON_EXTRACTION": {
              "Category": "Ban đỏ dạng vòng tròn repens",
              "Lesion_Type": ["Dải hồng ban uốn lượn", "Mảng dạng vòng"],
              "Colour": ["Đỏ hồng"],
              "Shape": ["Hình vân gỗ", "Ranh giới rõ"],
              "Distribution": ["Vùng thân mình", "Đồng tâm"],
              "Characteristics": ["Vảy mịn"]
            }
          }
          ```
    - example_3:
        disease_name: "Ban đỏ đa dạng"
        phase1_qa_output: >
          1. Hình bia bắn, sẩn hồng ban.
          2. Đỏ tươi, trung tâm sẫm màu.
          3. Hình tròn, ranh giới rõ.
          4. Lòng bàn tay, cổ tay, cẳng tay; sắp xếp đối xứng.
          5. Tổn thương bia bắn 3 vòng màu, bọng nước nhỏ.

        expected_json: |
          ```json
          {
            "JSON_EXTRACTION": {
              "Category": "Ban đỏ đa dạng",
              "Lesion_Type": ["Hình bia bắn", "Sẩn hồng ban"],
              "Colour": ["Đỏ", "Trung tâm sẫm màu"],
              "Shape": ["Hình tròn", "Ranh giới rõ"],
              "Distribution": ["Lòng bàn tay", "Cổ tay", "Cẳng tay", "Đối xứng"],
              "Characteristics": ["Biến đổi màu sắc 3 vùng", "Bọng nước"]
            } 
          }
          ```
    